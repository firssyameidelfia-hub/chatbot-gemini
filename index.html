<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot Premium</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1e1e2e; 
            color: #cdd6f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container { 
            width: 100%;
            max-width: 480px; 
            height: 90vh;
            background: #252538; 
            border-radius: 16px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.3); 
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #11111b;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #313244;
        }
        .chat-header h2 { font-size: 1.2rem; color: #89b4fa; }
        .messages { 
            flex: 1;
            overflow-y: auto; 
            padding: 20px; 
            background: #181825; 
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user-msg {
            background: #fa89bc;
            color: #11111b;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .bot-msg {
            background:biru#343144;
            color: #cdf4d3;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        .input-area { 
            display: flex; 
            padding: 15px;
            background: #1b1211;
            gap: 10px;
        }
        .input-area input { 
            flex: 1; 
            padding: 12px 16px; 
            border: 1px solid #313244; 
            border-radius: 24px; 
            background: #44313b;
            color: #cdd6f4;
            outline: none;
            font-size: 0.95rem;
        }
        .input-area input::placeholder { color: #6c7086; }
        .input-area button { 
            padding: 0 20px; 
            border: none; 
            background: #89b4fa; 
            color: #11111b; 
            border-radius: 24px; 
            cursor: pointer; 
            font-weight: bold;
            transition: background 0.2s;
        }
        .input-area button:hover { background: #b4befe; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h2>✨ Gemini AI Chatbot</h2>
    </div>
    <div class="messages" id="chat-messages">
        <div class="msg bot-msg">Halo! Ada yang bisa saya bantu hari ini?</div>
    </div>
    <form action="/get" method="get" class="input-area" id="chat-form">
        <input type="text" id="user-input" name="msg" placeholder="Tulis pesan..." autocomplete="off" required>
        <button type="submit">Kirim</button>
    </form>
</div>

<script>
    const form = document.getElementById('chat-form');
    const input = document.getElementById('user-input');
    const messagesDiv = document.getElementById('chat-messages');

    form.onsubmit = async (e) => {
        e.preventDefault();
        const text = input.value;
        if (!text) return;

        // Tampilkan pesan user (Gelembung Kanan)
        messagesDiv.innerHTML += `<div class="msg user-msg">${text}</div>`;
        input.value = '';
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        // Ambil jawaban dari server Python
        const response = await fetch(`/get?msg=${encodeURIComponent(text)}`);
        const data = await response.text();

        // Tampilkan jawaban AI (Gelembung Kiri)
        messagesDiv.innerHTML += `<div class="msg bot-msg">${data}</div>`;
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    };
</script>

</body>
</html>
